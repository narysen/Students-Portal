<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Personal Details - Students Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 flex flex-col justify-center items-center p-4 md:p-8 select-none">

    <div class="w-full max-w-3xl bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
        <div class="p-6 bg-gray-50 border-b border-gray-100 flex items-center space-x-3">
            <div class="p-2.5 bg-blue-50 text-blue-600 rounded-xl text-lg">
                <i class="fa-solid fa-user-gear"></i>
            </div>
            <div>
                <h3 class="font-black text-gray-800 text-lg uppercase tracking-wide">Setup Your Student Profile</h3>
                <p class="text-xs font-semibold text-gray-400">Please complete all fields below to create your official student profile records.</p>
            </div>
        </div>
        <form onsubmit="submitFirstTimeProfile(event)" class="p-6 md:p-8 space-y-6">
            
            <div>
                <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Personal Details Information</h4>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    
                    <!-- name -->
                    <div class="flex items-center space-x-4 bg-white p-3.5 rounded-xl border border-gray-200 transition-all focus-within:border-blue-500 focus-within:ring-4 focus-within:ring-blue-100">
                        <div class="text-gray-400 text-lg w-5 text-center"><i class="fa-solid fa-user"></i></div>
                        <div class="flex-1">
                            <label for="setup-name" class="block text-[11px] font-bold text-gray-400 uppercase tracking-wide mb-0.5">Full Name *</label>
                            <input type="text" id="setup-name" placeholder="Enter your full name" 
                                class="w-full text-sm font-bold text-gray-800 bg-transparent outline-none placeholder-gray-300" required>
                        </div>
                    </div>

                    <!-- id -->
                    <div class="flex items-center space-x-4 bg-white p-3.5 rounded-xl border border-gray-200 transition-all focus-within:border-blue-500 focus-within:ring-4 focus-within:ring-blue-100">
                        <div class="text-gray-400 text-lg w-5 text-center"><i class="fa-solid fa-fingerprint"></i></div>
                        <div class="flex-1">
                            <label for="setup-id" class="block text-[11px] font-bold text-gray-400 uppercase tracking-wide mb-0.5">Student ID *</label>
                            <input type="text" id="setup-id" placeholder="Enter Student ID" 
                                class="w-full text-sm font-bold text-blue-600 font-mono bg-transparent outline-none placeholder-gray-300" required>
                        </div>
                    </div>

                    <!-- gender -->
                    <div class="flex items-center space-x-4 bg-white p-3.5 rounded-xl border border-gray-200 transition-all focus-within:border-blue-500 focus-within:ring-4 focus-within:ring-blue-100">
                        <div class="text-gray-400 text-lg w-5 text-center"><i class="fa-solid fa-venus-mars"></i></div>
                        <div class="flex-1">
                            <label for="setup-gender" class="block text-[11px] font-bold text-gray-400 uppercase tracking-wide mb-0.5">Sex / Gender *</label>
                            <select id="setup-gender" class="w-full text-sm font-bold text-gray-800 bg-transparent outline-none cursor-pointer" required>
                                <option value="" disabled selected>Select Gender</option>
                                <option value="Female">Female</option>
                                <option value="Male">Male</option>
                            </select>
                        </div>
                    </div>

                    <!-- dob -->
                    <div class="flex items-center space-x-4 bg-white p-3.5 rounded-xl border border-gray-200 transition-all focus-within:border-blue-500 focus-within:ring-4 focus-within:ring-blue-100">
                        <div class="text-gray-400 text-lg w-5 text-center"><i class="fa-solid fa-calendar-days"></i></div>
                        <div class="flex-1">
                            <label for="setup-dob" class="block text-[11px] font-bold text-gray-400 uppercase tracking-wide mb-0.5">Date of Birth *</label>
                            <input type="date" id="setup-dob" class="w-full text-sm font-bold text-gray-800 bg-transparent outline-none cursor-pointer" required>
                        </div>
                    </div>

                    <!-- pob -->
                    <div class="flex items-center space-x-4 bg-white p-3.5 rounded-xl border border-gray-200 transition-all focus-within:border-blue-500 focus-within:ring-4 focus-within:ring-blue-100 md:col-span-2">
                        <div class="text-gray-400 text-lg w-5 text-center"><i class="fa-solid fa-map-location-dot"></i></div>
                        <div class="flex-1">
                            <label for="setup-pob" class="block text-[11px] font-bold text-gray-400 uppercase tracking-wide mb-0.5">Place of Birth *</label>
                            <input type="text" id="setup-pob" placeholder="e.g., Kampong Cham Province" 
                                class="w-full text-sm font-bold text-gray-800 bg-transparent outline-none placeholder-gray-300" required>
                        </div>
                    </div>

                    <!-- dapartment -->
                    <div class="flex items-center space-x-4 bg-white p-3.5 rounded-xl border border-gray-200 transition-all focus-within:border-blue-500 focus-within:ring-4 focus-within:ring-blue-100 md:col-span-2">
                        <div class="text-gray-400 text-lg w-5 text-center"><i class="fa-solid fa-building-user"></i></div>
                        <div class="flex-1">
                            <label for="setup-dept" class="block text-[11px] font-bold text-gray-400 uppercase tracking-wide mb-0.5">Department / Major *</label>
                            <input type="text" id="setup-dept" placeholder="e.g., Department of Information Technology Engineering" 
                                class="w-full text-sm font-bold text-gray-800 bg-transparent outline-none placeholder-gray-300" required>
                        </div>
                    </div>

                    <!-- phone number -->
                    <div class="flex items-center space-x-4 bg-white p-3.5 rounded-xl border border-gray-200 transition-all focus-within:border-blue-500 focus-within:ring-4 focus-within:ring-blue-100">
                        <div class="text-gray-400 text-lg w-5 text-center"><i class="fa-solid fa-phone"></i></div>
                        <div class="flex-1">
                            <label for="setup-phone" class="block text-[11px] font-bold text-gray-400 uppercase tracking-wide mb-0.5">Phone Number *</label>
                            <input type="tel" id="setup-phone" placeholder="e.g., 015 479 408" 
                                class="w-full text-sm font-bold text-gray-800 bg-transparent outline-none placeholder-gray-300" required>
                        </div>
                    </div>

                    <!-- elloment -->
                    <div class="flex items-center space-x-4 bg-white p-3.5 rounded-xl border border-gray-200 transition-all focus-within:border-blue-500 focus-within:ring-4 focus-within:ring-blue-100">
                        <div class="text-gray-400 text-lg w-5 text-center"><i class="fa-solid fa-calendar-check"></i></div>
                        <div class="flex-1">
                            <label for="setup-enrollment" class="block text-[11px] font-bold text-gray-400 uppercase tracking-wide mb-0.5">Official Enrollment Date *</label>
                            <input type="date" id="setup-enrollment" class="w-full text-sm font-bold text-gray-800 bg-transparent outline-none cursor-pointer" required>
                        </div>
                    </div>

                    <!-- address -->
                    <div class="flex items-center space-x-4 bg-white p-3.5 rounded-xl border border-gray-200 transition-all focus-within:border-blue-500 focus-within:ring-4 focus-within:ring-blue-100 md:col-span-2">
                        <div class="text-gray-400 text-lg w-5 text-center"><i class="fa-solid fa-location-dot"></i></div>
                        <div class="flex-1">
                            <label for="setup-address" class="block text-[11px] font-bold text-gray-400 uppercase tracking-wide mb-0.5">Current Residential Address *</label>
                            <input type="text" id="setup-address" placeholder="e.g., Ou Baek K'am, Saensokh, Phnom Penh" 
                                class="w-full text-sm font-bold text-gray-800 bg-transparent outline-none placeholder-gray-300" required>
                        </div>
                    </div>

                </div>
            </div>
            <div class="pt-2 flex justify-end">
                <button type="submit" class="flex items-center space-x-2 bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm px-6 py-3.5 rounded-xl shadow-md transform transition active:scale-95 shadow-blue-100">
                    <span>Save My Info & View Dashboard</span> <i class="fa-solid fa-arrow-right text-xs"></i>
                </button>
            </div>

        </form>
    </div>
    <script>
        function submitFirstTimeProfile(event) {
            event.preventDefault();
            const nameVal = document.getElementById('setup-name').value.trim();
            const idVal = document.getElementById('setup-id').value.trim();
            const genderVal = document.getElementById('setup-gender').value;
            const dobRawVal = document.getElementById('setup-dob').value; 
            const pobVal = document.getElementById('setup-pob').value.trim(); 
            const deptVal = document.getElementById('setup-dept').value.trim();    
            const phoneVal = document.getElementById('setup-phone').value.trim();
            const enrollmentRawVal = document.getElementById('setup-enrollment').value; 
            const addressVal = document.getElementById('setup-address').value.trim();

            const formatDate = (dateString) => {
                if(!dateString) return '';
                const options = { day: '2-digit', month: 'long', year: 'numeric' };
                return new Date(dateString).toLocaleDateString('en-GB', options); 
            };

            const formattedDob = formatDate(dobRawVal);
            const formattedEnrollment = formatDate(enrollmentRawVal);

            localStorage.setItem('student_name', nameVal);
            localStorage.setItem('student_id', idVal);
            localStorage.setItem('student_gender', genderVal);
            localStorage.setItem('student_dob', formattedDob || dobRawVal);
            localStorage.setItem('student_pob', pobVal);
            localStorage.setItem('student_department', deptVal);
            localStorage.setItem('student_phone', phoneVal);
            localStorage.setItem('student_address', addressVal);
            localStorage.setItem('student_enrollment', formattedEnrollment || enrollmentRawVal);
            
         
            localStorage.setItem('profile_completed', "true");
            window.location.href = "overview.html";
        }
    </script>
</body>
</html>
